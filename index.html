<!DOCTYPE html>
<html lang="en" data-theme="dark" data-density="comfortable" data-cardstyle="bordered">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>IBA · Indian Basketball Association @ Purdue</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Big+Shoulders+Display:wght@500;600;700;800;900&family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css?v=3" />

  <!-- Firebase SDK (modular, exposes window.db / window.auth / window.firestoreImports) -->
  <script type="module" src="js/firebase-config.js"></script>
  <!-- Google auth helper -->
  <script type="module" src="js/auth/google-auth.js"></script>

  <!-- React + Babel (browser transpiler for JSX) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
</head>
<body>
  <!-- Loading overlay — hidden once Firebase data arrives -->
  <div id="fb-loading">
    <div class="spin"></div>
  </div>

  <!-- React mount point -->
  <div id="root"></div>

  <!-- Firebase data loader (replaces static data.jsx) -->
  <script type="text/babel" src="js/data-firebase.jsx?v=4"></script>

  <!-- Shared UI atoms -->
  <script type="text/babel" src="js/atoms.jsx?v=4"></script>

  <!-- Top navigation -->
  <script type="text/babel" src="js/topnav.jsx?v=4"></script>

  <!-- Screens -->
  <script type="text/babel" src="js/screens/home.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/bracket.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/schedule.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/standings.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/teams.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/register.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/profile.jsx?v=4"></script>
  <script type="text/babel" src="js/screens/admin.jsx?v=4"></script>

  <!-- App root -->
  <script type="text/babel" src="js/app-main.jsx?v=4"></script>
</body>
</html>
